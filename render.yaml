# Render Blueprint — deploys the whole store as a single web service:
# the Express API also serves the built storefront and product images.
# See DEPLOY.md for step-by-step instructions.
services:
  - type: web
    name: scent-outlet
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build:deploy && pnpm run db:push && pnpm run db:seed
    startCommand: pnpm run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
