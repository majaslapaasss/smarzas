# Render Blueprint — deploys the whole store as a single web service:
# the Express API also serves the built storefront and product images.
# See DEPLOY.md for step-by-step instructions.
services:
  - type: web
    name: scent-outlet
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build:deploy && pnpm run db:push && pnpm run db:seed
    startCommand: pnpm run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false # sk_test_... from https://dashboard.stripe.com/test/apikeys
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # optional: whsec_... if you add a Stripe webhook endpoint
      - key: PAYSERA_PROJECT_ID
        sync: false # your Paysera project id from https://bank.paysera.com
      - key: PAYSERA_SIGN_PASSWORD
        sync: false # the Paysera project's sign password
      - key: PAYSERA_TEST
        value: "1" # 1 = Paysera test payments; set to 0 to accept real money
      # Order emails — Render's FREE tier blocks all outbound SMTP ports, so
      # use Brevo's HTTPS API (free at brevo.com): see DEPLOY.md "Order emails"
      - key: BREVO_API_KEY
        sync: false # xkeysib-... from Brevo → SMTP & API → API Keys
      - key: EMAIL_FROM
        sync: false # sender address — must be a verified sender in Brevo
      - key: ORDER_NOTIFY_EMAIL
        sync: false # optional: your address to receive a copy of every order
      # Classic SMTP fallback (only works on paid Render instances / other hosts)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
