kind = "web"
previewPath = "/"
title = "Perfume Baltic"
version = "1.0.0"
id = "artifacts/scent-outlet"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19045

[services.development]
run = "pnpm --filter @workspace/scent-outlet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scent-outlet", "run", "build" ]
serve = "static"
publicDir = "artifacts/scent-outlet/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19045"
BASE_PATH = "/"
